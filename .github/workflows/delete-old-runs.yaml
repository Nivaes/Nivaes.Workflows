name: Delete old workflow runs

on:
  workflow_call:

permissions:
  actions: write
  contents: read
  
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs (mantener solo 15)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          keep_minimum_runs: 15
          check_pullrequest_exist: true

      - name: Delete runs from the deleted branch
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          check_branch_existence: true
          check_pullrequest_exist: true
          keep_minimum_runs: 0
          retain_days: 0

      - name: Delete this run
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: delete-old-runs.yaml
          keep_minimum_runs: 0
          retain_days: 0

          
